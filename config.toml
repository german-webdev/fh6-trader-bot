[window]
title_contains = "Forza"
monitor_index = 0
required_width = 1920
required_height = 1080

[controls]
start_hotkey = "f6"
pause_hotkey = "f7"
stop_hotkey = "f8"

[timings]
after_enter_ms = 300
after_esc_ms = 300
after_down_ms = 300
detect_interval_ms = 150
search_timeout_ms = 4000
purchase_timeout_ms = 8000
startup_delay_ms = 1000

[detector]
match_threshold = 0.86
loader_match_threshold = 0.84
unknown_limit = 10
success_confirmations = 2
min_margin = 0.05
start_confirmations = 2

[debug]
save_unknown_frames = true
show_detector_scores = true
output_dir = "debug_frames"

[flow]
trusted_start_search = true
fast_restart_search = true
